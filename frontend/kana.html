<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kana Drill — Japanese Tutor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="drill-page">
    <header class="page-header">
      <span class="page-title-small" id="kana-type">Hiragana</span>
      <span class="session-count" id="session-count"></span>
    </header>

    <div class="card-area">
      <div class="kana-char" id="kana-char">…</div>
      <div class="kana-prompt" id="kana-prompt">Loading…</div>
    </div>

    <div class="transcript-area" id="transcript"></div>
    <div class="feedback" id="feedback"></div>

    <div class="controls">
      <button id="speak-btn" class="speak-button" disabled>🎤 SPEAK</button>
    </div>
  </main>

  <nav class="tab-bar">
    <a href="/conversation.html" class="tab">
      <span class="tab-icon">💬</span>
      <span class="tab-label">Chat</span>
    </a>
    <a href="/quiz.html" class="tab">
      <span class="tab-icon">📚</span>
      <span class="tab-label">Quiz</span>
    </a>
    <a href="/kana.html" class="tab active">
      <span class="tab-icon">あ</span>
      <span class="tab-label">Kana</span>
    </a>
    <a href="/progress.html" class="tab">
      <span class="tab-icon">📊</span>
      <span class="tab-label">Stats</span>
    </a>
  </nav>

  <script src="/js/audio.js"></script>
  <script src="/js/kana.js"></script>
</body>
</html>
